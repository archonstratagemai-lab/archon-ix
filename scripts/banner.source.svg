<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="ARCHON-IX Strategic Sovereignty banner">
  <!-- Sovereign-navy base canvas -->
  <rect width="1200" height="630" fill="#0A1128"/>

  <!-- Subtle architectural-gold radial glow to give depth without text -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="65%">
      <stop offset="0%"  stop-color="#C9A961" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#C9A961" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#E6C878"/>
      <stop offset="100%" stop-color="#C9A961"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Geometric emblem: a five-point compass surrounded by a thin ring.
       Centered horizontally, weighted toward the upper third so the
       wordmark below has breathing room. -->
  <g transform="translate(600 245)">
    <circle r="120" fill="none" stroke="#C9A961" stroke-opacity="0.35" stroke-width="2"/>
    <circle r="92"  fill="none" stroke="#C9A961" stroke-opacity="0.55" stroke-width="1.5"/>
    <path d="M0 -110 L26 -34 L110 -34 L42 14 L66 90 L0 42 L-66 90 L-42 14 L-110 -34 L-26 -34 Z"
          fill="url(#goldSheen)"/>
  </g>

  <!-- Wordmark -->
  <g text-anchor="middle" font-family="'Inter','Segoe UI',sans-serif">
    <text x="600" y="445" font-size="80" font-weight="700"
          fill="#E6C878" letter-spacing="22">ARCHON&#8209;IX</text>
    <text x="600" y="500" font-size="26" font-weight="300"
          fill="#AAB1C2" letter-spacing="8">STRATEGIC SOVEREIGNTY</text>
    <text x="600" y="540" font-size="20" font-weight="300"
          fill="#AAB1C2" letter-spacing="6" opacity="0.75">LEGACY ARCHITECTURE</text>
    <text x="600" y="588" font-style="italic" font-size="18"
          fill="#C9A961" opacity="0.85">"We do not accept entropy; we architect stability."</text>
  </g>

  <!-- Hairline frame echoing the emblem -->
  <rect x="20" y="20" width="1160" height="590" fill="none"
        stroke="#C9A961" stroke-opacity="0.22" stroke-width="1"/>
</svg>
