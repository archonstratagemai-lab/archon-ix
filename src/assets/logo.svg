<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="ARCHON-IX sovereign mark">
  <!-- Sovereign navy backdrop -->
  <rect width="100" height="100" fill="#0A1128"/>
  <!-- Architectural gold five-point emblem, mirroring the favicon -->
  <path d="M50 20 L60 40 L80 40 L65 55 L70 75 L50 60 L30 75 L35 55 L20 40 L40 40 Z"
        fill="#C9A961"/>
  <!-- Subtle gold border to keep the mark crisp at small sizes -->
  <rect x="0.5" y="0.5" width="99" height="99" fill="none" stroke="#C9A961" stroke-opacity="0.35"/>
</svg>
